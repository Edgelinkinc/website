</head>
<body>

<nav class="site-nav" id="site-nav"></nav>

<main id="page-content">
  <div class="loading">Loading…</div>
</main>

<footer id="site-footer"></footer>

<script src="shared.js"></script>
<script>
(function() {
  'use strict';
  var useDraft = window.location.search.indexOf('preview=1') !== -1;
  EDGELINK.loadContent(useDraft, function(err, content) {
    if (err) {
      document.getElementById('page-content').innerHTML =
        '<div class="loading" style="flex-direction: column; gap: 16px;">' +
        '<div>Could not load content.json</div>' +
        '<div style="font-size: 13px; color: #999;">' + (err.message || 'Error') + '</div>' +
        '</div>';
      return;
    }
    renderPage(content);
  });

  function renderPage(content) {
    EDGELINK.injectSeoTags(content, {
      title: (content.branding && content.branding.companyName ? content.branding.companyName : 'Edgelink') + ' Inc. — Connecting Communities',
      description: content.seo && content.seo.defaultDescription ? content.seo.defaultDescription : '',
      url: (content.seo && content.seo.siteUrl) || '',
      type: 'website'
    });

    document.getElementById('site-nav').innerHTML = EDGELINK.renderNav(content);

    var home = content.home || {};
    var html = '';

    html += '<section class="hero" id="top">';
    html += EDGELINK.renderHomeHero(home.hero);
    html += '</section>';

    if (home.stats && home.stats.length) {
      html += '<section class="stats-strip">';
      html += EDGELINK.renderStatsStrip(home.stats);
      html += '</section>';
    }

    if (home.about) {
      html += '<section class="about" id="about">';
      html += EDGELINK.renderAbout(home.about);
      html += '</section>';
    }

    if (home.services && home.services.items && home.services.items.length) {
      html += '<section id="services"><div class="section-inner">';
      html += EDGELINK.renderSectionHeader(home.services.eyebrow, home.services.headline, home.services.lead);
      html += EDGELINK.renderCards(home.services.items, { cols: 3 });
      html += '</div></section>';
    }

    if (home.values && home.values.items && home.values.items.length) {
      html += '<section class="about" id="values"><div class="section-inner">';
      html += EDGELINK.renderSectionHeader(home.values.eyebrow, home.values.headline, home.values.lead);
      html += EDGELINK.renderCards(home.values.items, { cols: 4 });
      html += '</div></section>';
    }

    if (home.news && home.news.enabled !== false && home.news.items && home.news.items.length) {
      html += '<section class="news-section" id="news">';
      html += EDGELINK.renderNews(home.news);
      html += '</section>';
    }

    if (home.locations && home.locations.states && home.locations.states.length) {
      html += '<section class="locations-bg" id="locations"><div class="section-inner">';
      html += EDGELINK.renderSectionHeader(home.locations.eyebrow, home.locations.headline, home.locations.lead);
      html += EDGELINK.renderLocations(home.locations.states);
      html += '</div></section>';
    }

    if (home.careersCallout) {
      html += '<section class="callout-section" id="careers-cta">';
      html += EDGELINK.renderCallout(home.careersCallout);
      html += '</section>';
    }

    if (home.contactForm && home.contactForm.enabled !== false) {
      html += '<section class="contact-section" id="contact">';
      html += EDGELINK.renderContactForm(home.contactForm);
      html += '</section>';
    }

    document.getElementById('page-content').innerHTML = html;
    document.getElementById('site-footer').innerHTML = EDGELINK.renderFooter(content);
    EDGELINK.attachContactFormHandler();
    EDGELINK.attachScrollReveal();
  }
})();
</script>

</body>
</html>
