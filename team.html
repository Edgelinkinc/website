<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Meet the team behind Edgelink Inc. — the family-owned wireless retail company across Arkansas, Connecticut, Massachusetts, Rhode Island, and Tennessee.">
<link rel="canonical" href="https://edgelinkinc.net/team.html">

<!-- OpenGraph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Edgelink Inc.">

<meta property="og:description" content="Real people, real stories. Get to know the team behind Edgelink Inc.">
<meta property="og:url" content="https://edgelinkinc.net/team.html">
<meta property="og:image" content="https://edgelinkinc.net/images/1778610698486-edgelink_logo-4-10-26.png">
<meta property="og:image:secure_url" content="https://edgelinkinc.net/images/1778610698486-edgelink_logo-4-10-26.png">
<meta property="og:image:alt" content="The Edgelink Team">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Meet the Team — Edgelink Inc.">
<meta name="twitter:description" content="Real people, real stories. Meet the family behind Edgelink.">
<meta name="twitter:image" content="https://edgelinkinc.net/images/1778610698486-edgelink_logo-4-10-26.png">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2 L28 16 L16 30 L4 16 Z' fill='%235F249F'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .team-page-hero {
    padding: 140px 40px 60px;
    background: linear-gradient(135deg, var(--lavender-soft) 0%, var(--white) 100%);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .team-page-hero::before {
    content: ''; position: absolute; top: 20%; right: -100px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(226, 0, 116, 0.08) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .team-page-hero::after {
    content: ''; position: absolute; bottom: -50px; left: -100px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .team-page-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 500; line-height: 1.05;
    margin: 12px 0 14px;
    color: var(--plum);
    letter-spacing: -0.02em;
    position: relative; z-index: 2;
  }
  .team-page-hero h1 em {
    font-style: italic;
    background: var(--gradient-warm);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .team-page-hero p {
    color: var(--gray-text);
    font-size: 17px;
    max-width: 580px;
    margin: 0 auto;
    line-height: 1.65;
    position: relative; z-index: 2;
  }
  .team-page-hero .hero-eyebrow {
    justify-content: center;
    position: relative; z-index: 2;
  }

  /* UNDER CONSTRUCTION VIEW */
  .construction {
    padding: 60px 24px 100px;
    text-align: center;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .construction-inner {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }
  .construction-icon {
    width: 96px; height: 96px;
    margin: 0 auto 24px;
    border-radius: 28px;
    background: var(--gradient-warm);
    display: flex; align-items: center; justify-content: center;
    color: white;
    box-shadow: 0 20px 50px rgba(226, 0, 116, 0.25);
    transform: rotate(-4deg);
    position: relative;
    animation: tilt 5s ease-in-out infinite;
  }
  @keyframes tilt {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }
  .construction-icon svg { width: 48px; height: 48px; }
  .construction-tag {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--gold-soft, #FEF3C7);
    color: #92400E;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    border: 1px solid rgba(251, 191, 36, 0.4);
  }
  .construction h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 500;
    color: var(--plum);
    margin-bottom: 16px;
    line-height: 1.1;
  }
  .construction h2 em {
    font-style: italic;
    background: var(--gradient-warm);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .construction p {
    color: var(--gray-text);
    font-size: 17px;
    line-height: 1.65;
    margin-bottom: 28px;
  }
  .construction-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple-mid) 100%);
    color: white;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 10px 28px rgba(45, 0, 71, 0.3);
    transition: transform 0.2s;
  }
  .construction-cta:hover { transform: translateY(-2px); }
  .construction-blob-1, .construction-blob-2 {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .construction-blob-1 {
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255, 64, 129, 0.10) 0%, transparent 70%);
  }
  .construction-blob-2 {
    bottom: -60px; left: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 70%);
  }

  @media (max-width: 900px) {
    .team-page-hero { padding: 120px 24px 40px; }
    .construction { padding: 40px 20px 80px; }
    .construction-icon { width: 80px; height: 80px; }
    .construction-icon svg { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<nav class="site-nav" id="site-nav"></nav>

<main id="page-content">
  <div class="loading">Loading…</div>
</main>

<footer id="site-footer"></footer>

<script src="shared.js"></script>
<script>
(function() {
  'use strict';
  var useDraft = window.location.search.indexOf('preview=1') !== -1;
  EDGELINK.loadContent(useDraft, function(err, content) {
    if (err) {
      document.getElementById('page-content').innerHTML =
        '<div class="loading" style="flex-direction: column; gap: 16px;">' +
        '<div>Could not load content.json</div>' +
        '<div style="font-size: 13px; color: #999;">' + (err.message || 'Error') + '</div>' +
        '</div>';
      return;
    }
    renderPage(content);
  });

  function renderPage(content) {
    EDGELINK.injectSeoTags(content, {
      title: 'Meet the Team — ' + (content.branding && content.branding.companyName ? content.branding.companyName : 'Edgelink') + ' Inc.',
      description: 'Meet the team behind Edgelink Inc. — real people, real stories.',
      url: ((content.seo && content.seo.siteUrl) || '') + '/team.html',
      type: 'website'
    });

    document.getElementById('site-nav').innerHTML = EDGELINK.renderNav(content);

    var team = content.team || {};
    var hero = team.hero || {};
    var status = team.status || 'live';
    var html = '';

    // Page hero (shown in both states)
    html += '<section class="team-page-hero">';
    if (hero.eyebrow) {
      html += '<div class="hero-eyebrow"><span class="dot"></span>' + EDGELINK.escapeHtml(hero.eyebrow) + '</div>';
    }
    if (hero.headline) {
      html += '<h1>' + hero.headline + '</h1>';
    }
    if (hero.lead) {
      html += '<p>' + EDGELINK.escapeHtml(hero.lead) + '</p>';
    }
    html += '</section>';

    // Under construction view OR full team grid
    if (status === 'under_construction') {
      html += renderUnderConstruction(team);
    } else {
      html += '<section class="team-section">';
      html += EDGELINK.renderTeam(team);
      html += '</section>';
    }

    document.getElementById('page-content').innerHTML = html;
    document.getElementById('site-footer').innerHTML = EDGELINK.renderFooter(content);

    if (status !== 'under_construction') {
      EDGELINK.attachTeamFilter();
    }
    EDGELINK.attachScrollReveal();
  }

  function renderUnderConstruction(team) {
    var msg = team.comingSoonMessage || 'We are putting the finishing touches on our team page. Check back soon!';
    var html = '<section class="construction">';
    html += '<div class="construction-blob-1"></div>';
    html += '<div class="construction-blob-2"></div>';
    html += '<div class="construction-inner">';
    html += '<div class="construction-icon">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M14 12v8"/><path d="M10 12v8"/><path d="M18 8v12"/><path d="M6 8v12"/><path d="M22 8H2l10-6 10 6z"/></svg>';
    html += '</div>';
    html += '<div class="construction-tag">🚧 Under Construction</div>';
    html += '<h2>This page is <em>coming soon</em>.</h2>';
    html += '<p>' + EDGELINK.escapeHtml(msg) + '</p>';
    html += '<a href="index.html" class="construction-cta">← Back to Home</a>';
    html += '</div>';
    html += '</section>';
    return html;
  }
})();
</script>

</body>
</html>
