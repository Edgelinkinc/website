<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edgelink Site Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5F249F;
  --purple-deep: #4A1B5C;
  --plum: #2D0047;
  --magenta: #E20074;
  --bg: #F8F4FB;
  --white: #fff;
  --border: #E5D4F0;
  --text: #1A0A2E;
  --muted: #6B5B7B;
  --green: #16a34a;
  --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

/* PIN GATE */
.gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.gate-box {
  background: white; padding: 48px; border-radius: 24px;
  box-shadow: 0 20px 60px rgba(74,27,92,0.15);
  max-width: 420px; width: 100%; text-align: center;
}
.gate-box h1 {
  font-family: 'Fraunces', serif; font-size: 28px; color: var(--plum);
  margin-bottom: 8px;
}
.gate-box p { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
.pin-input {
  width: 100%; padding: 16px; font-size: 20px; text-align: center;
  border: 2px solid var(--border); border-radius: 12px;
  letter-spacing: 0.4em; font-weight: 600;
  background: var(--bg);
}
.pin-input:focus { outline: none; border-color: var(--purple); }
.pin-error { color: var(--red); margin-top: 12px; font-size: 13px; }

/* APP LAYOUT */
.app { display: none; min-height: 100vh; }
.app.active { display: flex; flex-direction: column; }

header.topbar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  flex-wrap: wrap; gap: 12px;
}
.brand {
  font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
  color: var(--plum); display: flex; align-items: center; gap: 8px;
}
.brand-dot {
  width: 10px; height: 10px; background: var(--magenta); border-radius: 50%;
}
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  border: none; padding: 10px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--plum); color: white; }
.btn-primary:hover { background: var(--purple-deep); }
.btn-purple { background: var(--purple); color: white; }
.btn-purple:hover { background: var(--purple-deep); }
.btn-magenta { background: var(--magenta); color: white; }
.btn-ghost { background: white; color: var(--plum); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--purple); }
.btn-danger { background: white; color: var(--red); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.tabs {
  background: white; padding: 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 4px; overflow-x: auto;
}
.tab {
  padding: 14px 18px; border: none; background: none;
  font-size: 14px; font-weight: 500; cursor: pointer;
  color: var(--muted); border-bottom: 3px solid transparent;
  font-family: inherit; white-space: nowrap;
}
.tab.active { color: var(--purple); border-bottom-color: var(--purple); }
.tab:hover { color: var(--purple); }

.content { padding: 32px 24px; max-width: 1000px; margin: 0 auto; width: 100%; }
.panel { display: none; }
.panel.active { display: block; }

h2.section-title {
  font-family: 'Fraunces', serif; font-size: 24px; color: var(--plum);
  margin-bottom: 6px;
}
.section-help { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.field-group {
  background: white; padding: 24px; border-radius: 16px;
  margin-bottom: 16px; border: 1px solid var(--border);
}
.field-group h3 {
  font-family: 'Fraunces', serif; font-size: 17px;
  color: var(--plum); margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.field {
  margin-bottom: 16px;
}
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--purple); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit;
  background: var(--bg); color: var(--text);
}
.field input:focus, .field textarea:focus {
  outline: none; border-color: var(--purple); background: white;
}
.field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.field-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.list-item {
  background: var(--bg); padding: 16px; border-radius: 12px;
  margin-bottom: 12px; border: 1px solid var(--border);
  position: relative;
}
.list-item-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.list-item-label {
  font-size: 11px; font-weight: 700; color: var(--purple);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.list-actions { display: flex; gap: 6px; }
.icon-btn {
  background: white; border: 1px solid var(--border);
  width: 26px; height: 26px; border-radius: 6px;
  cursor: pointer; font-size: 12px; color: var(--muted);
  display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { color: var(--purple); border-color: var(--purple); }
.icon-btn.danger:hover { color: var(--red); border-color: #fecaca; }
.add-btn {
  background: white; border: 2px dashed var(--border);
  padding: 14px; border-radius: 12px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--purple);
  width: 100%; transition: all 0.2s; font-family: inherit;
}
.add-btn:hover { border-color: var(--purple); background: var(--bg); }

.status-banner {
  position: fixed; bottom: 24px; right: 24px;
  padding: 14px 20px; border-radius: 12px;
  background: var(--plum); color: white;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 100; display: none;
}
.status-banner.show { display: block; animation: slideIn 0.3s; }
.status-banner.success { background: var(--green); }
.status-banner.error { background: var(--red); }
@keyframes slideIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.help-card {
  background: linear-gradient(135deg, var(--purple), var(--purple-deep));
  color: white; padding: 20px; border-radius: 14px;
  margin-bottom: 24px; font-size: 14px; line-height: 1.6;
}
.help-card strong { color: #E5D4F0; }
.help-card code {
  background: rgba(255,255,255,0.15); padding: 2px 6px;
  border-radius: 4px; font-size: 12px;
}

@media (max-width: 700px) {
  .field-row, .field-row-3 { grid-template-columns: 1fr; }
  .content { padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>Edgelink Admin</h1>
    <p>Enter your PIN to edit the website</p>
    <input type="password" class="pin-input" id="pin-input" maxlength="4" inputmode="numeric" autofocus>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div class="app" id="app">
  <header class="topbar">
    <div class="brand"><span class="brand-dot"></span> Edgelink Site Admin <span id="user-label" style="font-size:12px; font-weight:500; color: var(--muted); margin-left: 8px;"></span></div>
    <div class="toolbar">
      <button class="btn btn-ghost" id="btn-reload">Reload from Live</button>
      <button class="btn btn-ghost" id="btn-preview">Preview Draft ↗</button>
      <button class="btn btn-purple" id="btn-save-draft">Save Draft</button>
      <button class="btn btn-magenta" id="btn-export">⬇ Export JSON</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-panel="branding">Branding</button>
    <button class="tab" data-panel="nav">Nav / Footer</button>
    <button class="tab" data-panel="home-hero">Home: Hero</button>
    <button class="tab" data-panel="home-stats">Home: Stats</button>
    <button class="tab" data-panel="home-about">Home: About</button>
    <button class="tab" data-panel="home-services">Home: Services</button>
    <button class="tab" data-panel="home-values">Home: Values</button>
    <button class="tab" data-panel="home-locations">Home: Locations</button>
    <button class="tab" data-panel="home-callout">Home: Careers Callout</button>
    <button class="tab" data-panel="home-contact">Home: Contact Form</button>
    <button class="tab" data-panel="home-news">Home: News</button>
    <button class="tab" data-panel="careers-hero">Careers: Hero</button>
    <button class="tab" data-panel="careers-why">Careers: Why Edgelink</button>
    <button class="tab" data-panel="careers-growth">Careers: Growth Path</button>
    <button class="tab" data-panel="careers-benefits">Careers: Benefits</button>
    <button class="tab" data-panel="careers-process">Careers: Application Process</button>
    <button class="tab" data-panel="careers-testimonials">Careers: Testimonials</button>
    <button class="tab" data-panel="careers-states">Careers: Hiring States</button>
    <button class="tab" data-panel="careers-faq">Careers: FAQ</button>
    <button class="tab" data-panel="careers-jobs">⭐ Careers: Open Jobs</button>
    <button class="tab" data-panel="careers-apply">Careers: Apply CTA</button>
    <button class="tab" data-panel="social">Social Media</button>
    <button class="tab" data-panel="seo">SEO</button>
    <button class="tab" data-panel="settings">⚙ Settings</button>
  </div>

  <div class="content">
    <div class="help-card" id="help-card">
      <strong>How this works:</strong> Edit any field, then click <strong>Save Draft</strong>. Use <strong>Preview Draft</strong> to see changes before publishing. When ready, click <strong>Export JSON</strong>, then upload the file as <code>content.json</code> to your GitHub repo to publish to the live site.
    </div>

    <div id="panels"></div>
  </div>
</div>

<div class="status-banner" id="status"></div>

<script>
(function() {
  'use strict';

  var PINS = {
    '3833': 'Cheryl',
    '5635': 'Joel',
    '6866': 'Sasha'
  };
  var LOCAL_DRAFT_KEY = 'edgelink_content_draft';
  var DEFAULT_CONTENT_URL = 'content.json';

  var state = {
    content: null,
    currentPanel: 'branding',
    user: null
  };

  // ===== PIN GATE =====
  var pinInput = document.getElementById('pin-input');
  var pinError = document.getElementById('pin-error');

  pinInput.addEventListener('input', function() {
    if (pinInput.value.length === 4) {
      var name = PINS[pinInput.value];
      if (name) {
        state.user = name;
        document.getElementById('user-label').textContent = '· ' + name;
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').classList.add('active');
        loadContent();
      } else {
        pinError.textContent = 'Invalid PIN';
        pinInput.value = '';
      }
    }
  });

  // ===== LOAD CONTENT =====
  function loadContent() {
    // Try draft first
    var draft = localStorage.getItem(LOCAL_DRAFT_KEY);
    if (draft) {
      try {
        state.content = JSON.parse(draft);
        showStatus('Loaded draft from local storage', 'success');
        renderCurrentPanel();
        return;
      } catch (e) {}
    }
    // Fetch live
    fetchLive();
  }

  function fetchLive() {
    fetch(DEFAULT_CONTENT_URL + '?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('content.json not found');
        return r.json();
      })
      .then(function(data) {
        state.content = data;
        showStatus('Loaded live content', 'success');
        renderCurrentPanel();
      })
      .catch(function(err) {
        showStatus('Failed to load content.json: ' + err.message, 'error');
      });
  }

  // ===== TABS =====
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function(e) {
      var panelKey = e.target.getAttribute('data-panel');
      switchTab(panelKey);
    });
  }

  function switchTab(panelKey) {
    state.currentPanel = panelKey;
    var allTabs = document.querySelectorAll('.tab');
    for (var i = 0; i < allTabs.length; i++) {
      if (allTabs[i].getAttribute('data-panel') === panelKey) {
        allTabs[i].classList.add('active');
      } else {
        allTabs[i].classList.remove('active');
      }
    }
    renderCurrentPanel();
  }

  // ===== RENDER PANEL =====
  function renderCurrentPanel() {
    if (!state.content) return;
    var panels = document.getElementById('panels');
    var panelKey = state.currentPanel;
    var html = '';

    switch (panelKey) {
      case 'branding':       html = renderBranding(); break;
      case 'nav':            html = renderNavFooter(); break;
      case 'home-hero':      html = renderHomeHeroPanel(); break;
      case 'home-stats':     html = renderHomeStatsPanel(); break;
      case 'home-about':     html = renderHomeAboutPanel(); break;
      case 'home-services':  html = renderHomeServicesPanel(); break;
      case 'home-values':    html = renderHomeValuesPanel(); break;
      case 'home-locations': html = renderHomeLocationsPanel(); break;
      case 'home-callout':   html = renderHomeCalloutPanel(); break;
      case 'home-contact':   html = renderHomeContactPanel(); break;
      case 'home-news':      html = renderHomeNewsPanel(); break;
      case 'careers-hero':         html = renderCareersHeroPanel(); break;
      case 'careers-why':          html = renderCareersWhyPanel(); break;
      case 'careers-growth':       html = renderCareersGrowthPanel(); break;
      case 'careers-benefits':     html = renderCareersBenefitsPanel(); break;
      case 'careers-process':      html = renderCareersProcessPanel(); break;
      case 'careers-testimonials': html = renderCareersTestimonialsPanel(); break;
      case 'careers-states':       html = renderCareersStatesPanel(); break;
      case 'careers-faq':          html = renderCareersFaqPanel(); break;
      case 'careers-jobs':         html = renderCareersJobsPanel(); break;
      case 'careers-apply':        html = renderCareersApplyPanel(); break;
      case 'social':               html = renderSocialPanel(); break;
      case 'seo':                  html = renderSeoPanel(); break;
      case 'settings':             html = renderSettingsPanel(); break;
    }

    panels.innerHTML = html;
    bindFieldEvents();
  }

  // ===== FIELD HELPERS =====
  function textField(path, label, hint) {
    var val = getPath(state.content, path) || '';
    return '<div class="field"><label>' + esc(label) + '</label>' +
      '<input type="text" data-path="' + path + '" value="' + escAttr(val) + '">' +
      (hint ? '<div class="field-hint">' + esc(hint) + '</div>' : '') + '</div>';
  }

  function textareaField(path, label, hint) {
    var val = getPath(state.content, path) || '';
    return '<div class="field"><label>' + esc(label) + '</label>' +
      '<textarea data-path="' + path + '">' + esc(val) + '</textarea>' +
      (hint ? '<div class="field-hint">' + esc(hint) + '</div>' : '') + '</div>';
  }

  function selectField(path, label, options, hint) {
    var val = getPath(state.content, path);
    if (val === undefined || val === null) val = '';
    var html = '<div class="field"><label>' + esc(label) + '</label>' +
      '<select data-path="' + path + '" data-type="' + (typeof options[0] === 'boolean' ? 'boolean' : 'string') + '">';
    for (var i = 0; i < options.length; i++) {
      var optVal = String(options[i]);
      var optLabel = typeof options[i] === 'boolean' ? (options[i] ? 'Active (visible on site)' : 'Inactive (hidden)') : options[i];
      var sel = String(val) === optVal ? ' selected' : '';
      html += '<option value="' + escAttr(optVal) + '"' + sel + '>' + esc(optLabel) + '</option>';
    }
    html += '</select>' + (hint ? '<div class="field-hint">' + esc(hint) + '</div>' : '') + '</div>';
    return html;
  }

  function imageField(path, label, hint) {
    var val = getPath(state.content, path) || '';
    var hasImg = val && val.length > 0;
    var html = '<div class="field"><label>' + esc(label) + '</label>';
    html += '<div style="display: flex; gap: 8px; align-items: stretch;">';
    html += '<input type="text" data-path="' + path + '" value="' + escAttr(val) + '" placeholder="Click Upload, or paste an image URL" style="flex: 1;">';
    html += '<button class="btn btn-magenta btn-sm" data-upload-target="' + path + '" style="flex-shrink: 0;">📷 Upload</button>';
    html += '</div>';
    if (hasImg) {
      html += '<div style="margin-top: 8px;"><img src="' + escAttr(val) + '" alt="" style="max-width: 200px; max-height: 120px; border-radius: 8px; border: 1px solid var(--border);"></div>';
    }
    if (hint) html += '<div class="field-hint">' + esc(hint) + '</div>';
    html += '</div>';
    return html;
  }

  // ===== PANELS =====
  function renderBranding() {
    return '<h2 class="section-title">Branding</h2>' +
      '<p class="section-help">Company-wide identity settings.</p>' +
      '<div class="field-group">' +
      textField('branding.companyName', 'Company Name', 'Shown in logo and titles') +
      textField('branding.tagline', 'Tagline', 'Used as the hero eyebrow on home page') +
      '</div>';
  }

  function renderNavFooter() {
    var html = '<h2 class="section-title">Navigation</h2>' +
      '<p class="section-help">Top menu links and the "Get in Touch" button.</p>';
    html += renderListPanel('nav.links', 'Nav Links', function(item, idx) {
      return textField('nav.links[' + idx + '].label', 'Label') +
        textField('nav.links[' + idx + '].href', 'Link URL', 'e.g. index.html#about or careers.html');
    }, function() { return { label: 'New Link', href: '#' }; });

    html += '<div class="field-group">' +
      '<h3>Nav CTA Button</h3>' +
      textField('nav.ctaLabel', 'Button Label') +
      textField('nav.ctaHref', 'Button Link URL') +
      '</div>';

    html += '<h2 class="section-title" style="margin-top: 32px;">Footer</h2>';
    html += '<div class="field-group">' +
      textareaField('footer.tagline', 'Footer Tagline') +
      textField('footer.copyright', 'Copyright Line') +
      textField('footer.legal', 'Legal Line') +
      '</div>';

    html += renderListPanel('footer.columns', 'Footer Columns', function(col, idx) {
      var inner = textField('footer.columns[' + idx + '].heading', 'Column Heading');
      inner += renderNestedList('footer.columns[' + idx + '].links', 'Links', function(link, j) {
        return textField('footer.columns[' + idx + '].links[' + j + '].label', 'Label') +
          textField('footer.columns[' + idx + '].links[' + j + '].href', 'URL');
      }, function() { return { label: 'New Link', href: '#' }; });
      return inner;
    }, function() { return { heading: 'New Column', links: [] }; });

    return html;
  }

  function renderHomeHeroPanel() {
    var html = '<h2 class="section-title">Home: Hero</h2>' +
      '<p class="section-help">The big section at the top of the home page.</p>' +
      '<div class="field-group">' +
      textField('home.hero.eyebrow', 'Eyebrow (small text above headline)') +
      textareaField('home.hero.headline', 'Headline', 'Use <em>...</em> for the italic purple highlight') +
      textareaField('home.hero.subhead', 'Subheadline') +
      imageField('home.hero.heroImageUrl', 'Hero Image (optional)', 'Upload a photo or paste a URL. Leave blank to use the default phone mockup.') +
      '</div>';

    html += renderListPanel('home.hero.stats', 'Hero Stat Pills', function(stat, idx) {
      return '<div class="field-row">' +
        textField('home.hero.stats[' + idx + '].value', 'Value (e.g. 35+)') +
        textField('home.hero.stats[' + idx + '].label', 'Label (e.g. Locations)') +
        '</div>';
    }, function() { return { value: '0', label: 'New Stat' }; });

    html += '<div class="field-group"><h3>Hero Buttons</h3>' +
      '<div class="field-row">' +
      textField('home.hero.primaryCtaLabel', 'Primary Button Label') +
      textField('home.hero.primaryCtaHref', 'Primary Button URL') +
      '</div>' +
      '<div class="field-row">' +
      textField('home.hero.secondaryCtaLabel', 'Secondary Button Label') +
      textField('home.hero.secondaryCtaHref', 'Secondary Button URL') +
      '</div></div>';

    // Phone mockup fields
    html += '<div class="field-group">' +
      '<h3>📱 Phone Mockup Text</h3>' +
      '<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">This is the text shown on the floating cell phone graphic. Only visible if no Hero Image is uploaded above.</p>' +
      textField('home.hero.phoneMockup.eyebrow', 'Eyebrow (top small text)', 'e.g. Team Edgelink') +
      textField('home.hero.phoneMockup.headline', 'Headline (large text)', 'e.g. One family. Five states.') +
      '<div class="field-row">' +
      textField('home.hero.phoneMockup.card1Label', 'Card 1 Label', 'e.g. Active Stores') +
      textField('home.hero.phoneMockup.card1Value', 'Card 1 Value', 'e.g. 35') +
      '</div>' +
      '<div class="field-row">' +
      textField('home.hero.phoneMockup.card2Label', 'Card 2 Label', 'e.g. Team') +
      textField('home.hero.phoneMockup.card2Value', 'Card 2 Value', 'e.g. 200+ Members') +
      '</div>' +
      '<div class="field-row">' +
      textField('home.hero.phoneMockup.card3Label', 'Card 3 Label', 'e.g. Our Mission') +
      textField('home.hero.phoneMockup.card3Value', 'Card 3 Value', 'e.g. Connect communities. Build careers.') +
      '</div>' +
      '<div class="field-row">' +
      textField('home.hero.phoneMockup.bubbleTopLabel', 'Top Bubble Label', 'Small text on top floating bubble') +
      textField('home.hero.phoneMockup.bubbleTopValue', 'Top Bubble Value', 'Large text on top floating bubble') +
      '</div>' +
      '<div class="field-row">' +
      textField('home.hero.phoneMockup.bubbleBottomLabel', 'Bottom Bubble Label', 'Small text on bottom floating bubble') +
      textField('home.hero.phoneMockup.bubbleBottomValue', 'Bottom Bubble Value', 'Large text on bottom floating bubble') +
      '</div>' +
      '</div>';

    return html;
  }

  function renderHomeStatsPanel() {
    var html = '<h2 class="section-title">Home: Stats Strip</h2>' +
      '<p class="section-help">The 4 large stats shown right under the hero.</p>';
    html += renderListPanel('home.stats', 'Stats', function(stat, idx) {
      return '<div class="field-row">' +

  function renderCareersJobsPanel() {
    var html = '<h2 class="section-title">⭐ Careers: Open Jobs</h2>' +
      '<p class="section-help">Manage your open positions. Each job appears on the careers page and (in next update) will be eligible for Google for Jobs free listings.</p>';

    html += '<div class="help-card" style="margin-bottom: 20px;">' +
      '<strong>How this works:</strong><br>' +
      '• Add a job, fill in the details, mark it <strong>Active</strong> = appears on careers page<br>' +
      '• Set <strong>Active = false</strong> to take it down without deleting<br>' +
      '• The Apply URL should be the AppOne link for that location, or leave blank to default to email HR<br>' +
      '• <strong>Tip:</strong> clone an existing job by copying it — most fields will be the same' +
      '</div>';

    html += '<div class="field-group">' +
      '<h3>Section Header</h3>' +
      textField('careers.openPositions.eyebrow', 'Eyebrow') +
      textareaField('careers.openPositions.headline', 'Headline') +
      textareaField('careers.openPositions.lead', 'Lead paragraph') +
      textareaField('careers.openPositions.noJobsMessage', 'Message when no jobs are posted') +
      '</div>';

    var jobs = getPath(state.content, 'careers.openPositions.items') || [];

    html += '<div class="field-group"><h3>Job Listings (' + jobs.length + ')</h3>';

    for (var i = 0; i < jobs.length; i++) {
      var job = jobs[i];
      var activeLabel = job.active === false ? ' (INACTIVE)' : '';
      var activeColor = job.active === false ? 'color: #dc2626;' : 'color: var(--green);';
      html += '<div class="list-item">';
      html += '<div class="list-item-header">';
      html += '<span class="list-item-label" style="' + activeColor + '">#' + (i + 1) + ' &middot; ' + esc(job.title || 'Untitled') + ' &middot; ' + esc(job.state || '?') + activeLabel + '</span>';
      html += '<div class="list-actions">';
      if (i > 0) html += '<button class="icon-btn" data-action="move-up" data-list="careers.openPositions.items" data-idx="' + i + '" title="Move up">↑</button>';
      if (i < jobs.length - 1) html += '<button class="icon-btn" data-action="move-down" data-list="careers.openPositions.items" data-idx="' + i + '" title="Move down">↓</button>';
      html += '<button class="icon-btn" data-action="duplicate" data-list="careers.openPositions.items" data-idx="' + i + '" title="Duplicate">⎘</button>';
      html += '<button class="icon-btn danger" data-action="delete" data-list="careers.openPositions.items" data-idx="' + i + '" title="Delete">✕</button>';
      html += '</div></div>';

      // CORE
      html += '<div class="field-row">' +
        textField('careers.openPositions.items[' + i + '].title', 'Job Title', 'e.g. Retail Sales Representative') +
        selectField('careers.openPositions.items[' + i + '].employmentType', 'Employment Type', ['FULL_TIME','PART_TIME','CONTRACTOR','TEMPORARY','INTERN','OTHER']) +
        '</div>';

      html += '<div class="field-row">' +
        selectField('careers.openPositions.items[' + i + '].active', 'Status', [true, false]) +
        textField('careers.openPositions.items[' + i + '].id', 'Job ID (URL slug)', 'e.g. rsr-bald-hill-warwick-ri — used in the page URL') +
        '</div>';

      // LOCATION
      html += '<div class="field-row">' +
        selectField('careers.openPositions.items[' + i + '].state', 'State', ['AR','CT','MA','RI','TN','OTHER']) +
        textField('careers.openPositions.items[' + i + '].storeName', 'Store Name (optional)', 'e.g. Bald Hill, Providence Place Mall') +
        '</div>';

      html += '<div class="field-row">' +
        textField('careers.openPositions.items[' + i + '].city', 'City') +
        textField('careers.openPositions.items[' + i + '].postalCode', 'Postal Code') +
        '</div>';

      html += textField('careers.openPositions.items[' + i + '].storeAddress', 'Full Store Address (street + city + state + zip)', 'Required for Google for Jobs');

      // PAY
      html += '<div class="field-row-3">' +
        textField('careers.openPositions.items[' + i + '].payMin', 'Pay Min', 'e.g. 13') +
        textField('careers.openPositions.items[' + i + '].payMax', 'Pay Max', 'e.g. 22') +
        selectField('careers.openPositions.items[' + i + '].payUnit', 'Unit', ['HOUR','DAY','WEEK','MONTH','YEAR']) +
        '</div>';

      // DATES
      html += '<div class="field-row">' +
        textField('careers.openPositions.items[' + i + '].datePosted', 'Date Posted', 'YYYY-MM-DD') +
        textField('careers.openPositions.items[' + i + '].validThrough', 'Valid Through', 'YYYY-MM-DD — required by Google. Posting auto-hides after this date.') +
        '</div>';

      // DESCRIPTION
      html += textareaField('careers.openPositions.items[' + i + '].description', 'Job Description', 'A few sentences about the role. First sentence shows as the summary on the careers page.');

      // RESPONSIBILITIES / REQUIREMENTS / BENEFITS — each is a string array
      var resps = job.responsibilities || [];
      html += '<div class="field"><label>Responsibilities (one per line)</label>' +
        '<textarea data-path-list="careers.openPositions.items[' + i + '].responsibilities" style="min-height:100px;">' + esc(resps.join('\n')) + '</textarea></div>';

      var reqs = job.requirements || [];
      html += '<div class="field"><label>Requirements (one per line)</label>' +
        '<textarea data-path-list="careers.openPositions.items[' + i + '].requirements" style="min-height:100px;">' + esc(reqs.join('\n')) + '</textarea></div>';

  function testGitHubConnection() {
    var token = localStorage.getItem('edgelink_github_token');
    var repo = localStorage.getItem('edgelink_github_repo') || 'Edgelinkinc/website';
    var resultEl = document.getElementById('gh-test-result');
    if (!token) { resultEl.innerHTML = '<span style="color: var(--red);">No token saved.</span>'; return; }
    resultEl.innerHTML = '<span style="color: var(--muted);">Testing...</span>';
    fetch('https://api.github.com/repos/' + repo, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      resultEl.innerHTML = '<span style="color: var(--green);">✓ Connected to ' + esc(data.full_name) + '</span>';
    })
    .catch(function(err) {
      resultEl.innerHTML = '<span style="color: var(--red);">Connection failed: ' + esc(err.message) + '. Check token and repo name.</span>';
    });

  function uploadImageToGitHub(file, callback) {
    var token = localStorage.getItem('edgelink_github_token');
    var repo = localStorage.getItem('edgelink_github_repo') || 'Edgelinkinc/website';
    var branch = localStorage.getItem('edgelink_github_branch') || 'main';
    if (!token) { callback(new Error('No GitHub token set. Go to Settings tab to add one.')); return; }

    var reader = new FileReader();
    reader.onload = function(e) {
      // base64 encode (strip the data URL prefix)
      var base64 = e.target.result.split(',')[1];
      // Generate a safe filename
      var origName = file.name.toLowerCase().replace(/[^a-z0-9._-]/g, '-');
      var timestamp = new Date().getTime();
      var filename = timestamp + '-' + origName;
      var path = 'images/' + filename;

      fetch('https://api.github.com/repos/' + repo + '/contents/' + path, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Upload ' + filename + ' via admin',
          content: base64,
          branch: branch
        })
      })
      .then(function(r) {
        return r.json().then(function(data) {
          if (!r.ok) throw new Error(data.message || ('HTTP ' + r.status));
          return data;
        });
      })
      .then(function(data) {
        // Return the relative path that works in the live site
        callback(null, path);
      })
      .catch(function(err) {
        callback(err);
      });
    };
    reader.onerror = function() { callback(new Error('Could not read file')); };
    reader.readAsDataURL(file);
  }

            country: 'US',

            responsibilities: [],
            requirements: [],
            benefits: [],

          dup.title = (dup.title || 'Job') + ' (Copy)';

  function generateSitemap() {
    var siteUrl = (state.content.seo && state.content.seo.siteUrl) || 'https://edgelinkinc.net';
    siteUrl = siteUrl.replace(/\/$/, ''); // strip trailing slash

    var today = new Date().toISOString().slice(0, 10);
    var urls = [
      { loc: siteUrl + '/', changefreq: 'weekly', priority: '1.0' },
      { loc: siteUrl + '/careers.html', changefreq: 'weekly', priority: '0.9' },
      { loc: siteUrl + '/privacy.html', changefreq: 'yearly', priority: '0.3' },
      { loc: siteUrl + '/terms.html', changefreq: 'yearly', priority: '0.3' }
    ];

    // Add active job pages
    var jobs = (state.content.careers && state.content.careers.openPositions && state.content.careers.openPositions.items) || [];
    var activeJobCount = 0;
    for (var i = 0; i < jobs.length; i++) {
      if (jobs[i].active !== false && jobs[i].id) {
        urls.push({
          loc: siteUrl + '/job.html?id=' + encodeURIComponent(jobs[i].id),
          changefreq: 'daily',
          priority: '0.8',
          lastmod: jobs[i].datePosted || today
        });
        activeJobCount++;
      }
    }

    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
    for (var j = 0; j < urls.length; j++) {
      xml += '  <url>\n';
      xml += '    <loc>' + urls[j].loc + '</loc>\n';
      if (urls[j].lastmod) xml += '    <lastmod>' + urls[j].lastmod + '</lastmod>\n';
      xml += '    <changefreq>' + urls[j].changefreq + '</changefreq>\n';
      xml += '    <priority>' + urls[j].priority + '</priority>\n';
      xml += '  </url>\n';
    }
    xml += '</urlset>\n';

    // Download the file
    try {
      var blob = new Blob([xml], { type: 'application/xml;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'sitemap.xml';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() {
        if (a.parentNode) a.parentNode.removeChild(a);
        URL.revokeObjectURL(url);
      }, 250);

      var resultEl = document.getElementById('sitemap-result');
      resultEl.innerHTML = '<span style="color:var(--green);font-weight:600;">✓ sitemap.xml downloaded</span> &middot; ' +
        urls.length + ' total URLs (' + activeJobCount + ' active job' + (activeJobCount === 1 ? '' : 's') + ')<br>' +
        '<span style="color:var(--muted);font-size:12px;">Upload it to your GitHub repo (replace the existing sitemap.xml) to publish.</span>';
    } catch (err) {
      var resultEl2 = document.getElementById('sitemap-result');
      resultEl2.innerHTML = '<span style="color:var(--red);">Download failed: ' + esc(err.message || err) + '</span>';
    }
  }

  function buildNewItem(sample) {
    if (sample === null || sample === undefined) return '';
    if (typeof sample === 'string') return 'New item';
    if (typeof sample === 'object') {
      var newObj = {};
      for (var key in sample) {
        if (sample.hasOwnProperty(key)) {
          if (Array.isArray(sample[key])) {
            newObj[key] = [];
          } else if (typeof sample[key] === 'object') {
            newObj[key] = {};
          } else {
            newObj[key] = '';
          }
        }
      }
      return newObj;
    }
    return '';
  }

  // ===== PATH HELPERS =====
  // Parse path like "home.about.paragraphs[2]" or "footer.columns[0].links[1].label"
  function parsePath(path) {
    var parts = [];
    var regex = /([^.\[\]]+)|\[(\d+)\]/g;
    var match;
    while ((match = regex.exec(path)) !== null) {
      if (match[1] !== undefined) parts.push(match[1]);
      else if (match[2] !== undefined) parts.push(parseInt(match[2], 10));
    }
    return parts;
  }

  function getPath(obj, path) {
    var parts = parsePath(path);
    var cur = obj;
    for (var i = 0; i < parts.length; i++) {
      if (cur === null || cur === undefined) return undefined;
      cur = cur[parts[i]];
    }
    return cur;
  }

  function setPath(obj, path, value) {
    var parts = parsePath(path);
    var cur = obj;
    for (var i = 0; i < parts.length - 1; i++) {
      if (cur[parts[i]] === undefined || cur[parts[i]] === null) {
        cur[parts[i]] = (typeof parts[i + 1] === 'number') ? [] : {};
      }
      cur = cur[parts[i]];
    }
    cur[parts[parts.length - 1]] = value;
  }

  // ===== UTILITIES =====
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function escAttr(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  var statusTimeout;
  function showStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-banner show ' + (type || '');
    if (statusTimeout) clearTimeout(statusTimeout);
    statusTimeout = setTimeout(function() {
      el.classList.remove('show');
    }, 3500);
  }
})();
</script>
